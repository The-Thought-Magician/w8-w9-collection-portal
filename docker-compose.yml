services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 3s
      timeout: 3s
      retries: 30
  backend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm i -g pnpm >/dev/null 2>&1; pnpm install; node --import tsx/esm src/index.ts"
    environment:
      PORT: "3001"
      DATABASE_URL: postgres://app:app@db:5432/app
      FRONTEND_URL: http://localhost:3000
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"
  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm i -g pnpm >/dev/null 2>&1; pnpm install; pnpm dev"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    volumes:
      - ./web:/app
    depends_on:
      - backend
    ports:
      - "3000:3000"
